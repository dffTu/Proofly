services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: proofly
      POSTGRES_USER: proofly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-proofly}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofly"]
      interval: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    command: ["-path", "/sql", "-database", "postgres://proofly:${DB_PASSWORD:-proofly}@db:5432/proofly?sslmode=disable", "up"]
    volumes:
      - ./sql:/sql
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  web:
    build: .
    command: >
      sh -c "python scripts/load_data.py &&
             python manage.py collectstatic --noinput &&
             gunicorn proofly.wsgi:application -b 0.0.0.0:8000 -w 2"
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://proofly:${DB_PASSWORD:-proofly}@db:5432/proofly
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: proofly.ganvas.ru
      STATIC_ROOT: /app/staticfiles
    volumes:
      - static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  static:
