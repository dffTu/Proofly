{% extends "graph/base.html" %}
{% block title %}Proofly — Граф теорем алгебры{% endblock %}

{% block content %}
<div id="header">
  <h1>Proofly</h1>
  <div class="search-wrapper">
    <input id="search-input" type="text" placeholder="" autocomplete="off" />
    <div id="search-results"></div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot axiom"></div>
      <span data-i18n="axiom"></span>
    </div>
    <div class="legend-item">
      <div class="legend-dot theorem"></div>
      <span data-i18n="theorem"></span>
    </div>
  </div>
  <div class="lang-switcher">
    <button id="lang-en" class="lang-btn">EN</button>
    <span style="color:#2a2d3a">|</span>
    <button id="lang-ru" class="lang-btn">RU</button>
  </div>
</div>

<div id="graph-container">
  <svg id="graph-svg"></svg>
</div>

<div id="proof-panel">
  <div id="panel-header">
    <span id="panel-type-badge" class="panel-type-badge"></span>
    <span id="panel-title"></span>
    <button id="panel-close" title="×">×</button>
  </div>
  <div id="panel-body"></div>
</div>

<div id="hint" data-i18n="hint"></div>
{% endblock %}
