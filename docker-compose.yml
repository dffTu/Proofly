services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: proofly
      POSTGRES_USER: proofly
      POSTGRES_PASSWORD: proofly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofly"]
      interval: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    command: ["-path", "/sql", "-database", "postgres://proofly:proofly@db:5432/proofly?sslmode=disable", "up"]
    volumes:
      - ./sql:/sql
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  web:
    build: .
    command: >
      sh -c "python scripts/load_data.py && python manage.py runserver 0.0.0.0:80"
    volumes:
      - .:/app
    ports:
      - "80:80"
    environment:
      DATABASE_URL: postgres://proofly:proofly@db:5432/proofly
      DEBUG: "True"
      SECRET_KEY: proofly-dev-secret-key-change-in-production
      ALLOWED_HOSTS: "*"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
