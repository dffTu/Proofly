services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: proofly
      POSTGRES_USER: proofly
      POSTGRES_PASSWORD: proofly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofly"]
      interval: 5s
      retries: 5

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app          # монтируем код — изменения применяются без пересборки
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://proofly:proofly@db:5432/proofly
      DEBUG: "True"
      SECRET_KEY: proofly-dev-secret-key-change-in-production
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
